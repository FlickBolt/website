<footer class="border-t border-zinc-900 mt-16">
  <div class="mx-auto max-w-6xl px-4 py-8 flex flex-col md:flex-row gap-4 justify-between text-sm text-zinc-400">
    <div>© {{ site.time | date: "%Y" }} FlickBolt. Filming with consent matters.</div>
    <nav class="flex flex-wrap gap-4">
      {% for item in site.data.nav.footer %}
        <a href="{{ item.url }}" class="hover:text-zinc-200">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</footer>
