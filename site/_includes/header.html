<header class="sticky top-0 z-40 backdrop-blur bg-zinc-950/70 border-b border-zinc-900">
  <div class="mx-auto max-w-6xl px-4 h-14 flex items-center gap-6">
    <a href="/" class="font-semibold tracking-tight text-lg">
      <span class="text-amber-400">⚡</span> FlickBolt
    </a>
    <nav class="hidden md:flex items-center gap-5 text-sm text-zinc-300">
      {% for item in site.data.nav.primary %}
        <a href="{{ item.url }}" class="hover:text-white">{{ item.title }}</a>
      {% endfor %}
    </nav>
    <div class="flex-1"></div>
    <div id="nav-auth" class="flex items-center gap-2 text-sm">
      <!-- swapped by auth.js -->
      {% for item in site.data.nav.auth_out %}
        <a href="{{ item.url }}"
           class="px-3 py-1.5 rounded-lg {% if item.style == 'solid' %}bg-amber-400 text-zinc-950 font-medium hover:bg-amber-300{% else %}border border-zinc-800 hover:border-zinc-700{% endif %}">
          {{ item.title }}
        </a>
      {% endfor %}
    </div>
    <button id="nav-mobile-toggle" class="md:hidden ml-1 p-2 -mr-2" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
  <div id="nav-mobile" class="hidden md:hidden border-t border-zinc-900">
    <div class="px-4 py-3 flex flex-col gap-2 text-sm">
      {% for item in site.data.nav.primary %}
        <a href="{{ item.url }}" class="py-1">{{ item.title }}</a>
      {% endfor %}
    </div>
  </div>
</header>
<script>
  document.getElementById('nav-mobile-toggle')?.addEventListener('click', () => {
    document.getElementById('nav-mobile').classList.toggle('hidden');
  });
</script>
